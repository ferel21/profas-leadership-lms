version: '3.8'

services:
  profas-lms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profas-lms-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      # Persistent volume untuk menyimpan video MP4, PDF, dan foto profil secara permanen
      - lms-uploads:/app/public/uploads

volumes:
  lms-uploads:
