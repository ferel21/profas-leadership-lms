name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    env:
      # Build-time values or secrets if provided; production secrets never enter the CI build artifact.
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://build:build@127.0.0.1:5432/build?connect_timeout=1' }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://build:build@127.0.0.1:5432/build?connect_timeout=1' }}
      JWT_SECRET: ci-only-jwt-secret-012345678901234567890123456789
      NEXTAUTH_SECRET: ci-only-nextauth-secret-012345678901234567890
      NEXTAUTH_URL: https://ci.invalid
      NEXT_PUBLIC_APP_URL: https://ci.invalid
      PRIVATE_UPLOAD_DIR: /app/.data/uploads
      HEALTHCHECK_TOKEN: ci-only-health-token-012345678901234567890
      REQUIRE_HEALTHCHECK_TOKEN: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate build environment
        run: npm run validate:env -- --production
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
      - name: Performance budget
        run: npm run perf:budget
      - name: Smoke test
        run: npm run smoke

  deploy:
    name: Deploy to VPS
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      - name: Deploy application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/var/www/profas-lms' }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "${VPS_KNOWN_HOSTS}" ]; then
            echo "${VPS_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${VPS_SSH_PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts
          # Deployment dijalankan via SSH di VPS target tanpa mengirim file .env dari runner
          ssh -p "${VPS_SSH_PORT}" "${VPS_USER}@${VPS_HOST}" "cd ${VPS_APP_DIR} && bash deploy/vps/deploy.sh"
