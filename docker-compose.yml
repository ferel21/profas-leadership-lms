services:
  profas-lms:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://profas-leadership-lms.vercel.app}
    container_name: profas-lms-app
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - PRIVATE_UPLOAD_DIR=/app/.data/uploads
      - REQUIRE_HEALTHCHECK_TOKEN=${REQUIRE_HEALTHCHECK_TOKEN:-true}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    volumes:
      # Persistent volume private; akses file tetap melalui endpoint berotorisasi.
      - lms-uploads:/app/.data/uploads

volumes:
  lms-uploads:
